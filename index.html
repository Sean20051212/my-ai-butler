<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI Butler Vision Container</title>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body style="-webkit-app-region: drag;">
    <script src="pixi.min.js"></script>
    <script src="live2dcubismcore.min.js"></script>
    <script src="cubism4.min.js"></script>

    <script>
        async function init() {
            // 從全域獲取，確保相容性
            const Live2DModel = window.PIXI?.live2d?.Live2DModel || window.Live2DModel;

            if (!Live2DModel) {
                console.error("❌ 找不到 Live2DModel。請確認 pixi.min.js 與 cubism4.min.js 確實存在於桌機的專案資料夾內！");
                return;
            }

            // 初始化透明畫布
            const app = new PIXI.Application({
                autoStart: true,
                resizeTo: window,
                backgroundAlpha: 0, // 核心：讓 PixiJS 畫布透明
                antialias: true
            });
            document.body.appendChild(app.view);

            try {
                const modelPath = "./model/Hiyori/hiyori_free_t08.model3.json";
                const model = await Live2DModel.from(modelPath);

                app.stage.addChild(model);
                model.anchor.set(0.5, 0.5); 
                model.x = window.innerWidth / 2;
                model.y = window.innerHeight / 2;
                
                const scale = (window.innerHeight * 0.8) / model.height;
                model.scale.set(scale);

                // 點擊觸發隨機動作
                model.on("hit", (hitAreas) => {
                    if (hitAreas.includes("Body")) {
                        model.motion("TapBody"); 
                    }
                });

                console.log("✅ 模型加載完成！");
            } catch (e) {
                console.error("模型加載失敗:", e);
            }
        }

        // 確保腳本載入完畢後才執行
        window.onload = init;
    </script>
</body>
</html>
