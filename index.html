<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI Butler Vision Container</title>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        #drag-zone { position: absolute; top: 0; left: 0; width: 100vw; height: calc(100vh - 100px); z-index: 5; -webkit-app-region: drag; }
        #chat-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; align-items: center; width: 80%; }
        #dialogue-box { background: rgba(0, 0, 0, 0.6); color: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; width: 100%; text-align: center; font-size: 16px; display: none; text-shadow: 1px 1px 2px black; }
        #input-area { display: flex; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #user-input { flex-grow: 1; padding: 10px; border-radius: 5px 0 0 5px; border: none; outline: none; background: rgba(255, 255, 255, 0.9); }
        #send-btn { padding: 10px 20px; border: none; background: #ff7675; color: white; font-weight: bold; border-radius: 0 5px 5px 0; cursor: pointer; transition: background 0.2s; }
        #send-btn:hover { background: #d63031; }
    </style>
</head>
<body>
    <div id="drag-zone"></div>
    
    <script src="pixi.min.js"></script>
    <script src="live2dcubismcore.min.js"></script>
    <script src="cubism4.min.js"></script>
    
    <div id="chat-container">
        <div id="dialogue-box"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="說點什麼吧..." autocomplete="off">
            <button id="send-btn">發送</button>
        </div>
    </div>

    <script>
        const Live2DModel = window.PIXI?.live2d?.Live2DModel || window.Live2DModel;
        let live2dModel = null;

        async function init() {
            if (!Live2DModel) return;

            const app = new PIXI.Application({
                autoStart: true, resizeTo: window, backgroundAlpha: 0, antialias: true
            });
            document.body.appendChild(app.view);

            try {
                const modelPath = "./model/Yachiyo/八千代辉夜姬.model3.json";
                live2dModel = await Live2DModel.from(modelPath);
                app.stage.addChild(live2dModel);
                live2dModel.anchor.set(0.5, 0.5); 
                live2dModel.x = window.innerWidth / 2;
                live2dModel.y = window.innerHeight / 2;
                let currentScale = (window.innerHeight * 0.8) / live2dModel.height;
                live2dModel.scale.set(currentScale);
                
                // 🌟 核心防護：徹底關閉模型的滑鼠互動與視線追蹤
                live2dModel.autoInteract = false;

            } catch (e) {
                console.error("模型加載失敗:", e);
            }
        }
        
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const dialogBox = document.getElementById('dialogue-box');

        let audioCtx = null;

        function setMouth(value) {
            if (live2dModel)
                live2dModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', value);
        }

        async function playWithLipSync(base64Wav) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            const binary = atob(base64Wav);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

            const audioBuffer = await audioCtx.decodeAudioData(bytes.buffer);
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;

            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            analyser.connect(audioCtx.destination);

            const freqData = new Uint8Array(analyser.frequencyBinCount);
            let rafId;

            function updateMouth() {
                analyser.getByteFrequencyData(freqData);
                // 取低頻段（語音能量集中在前 1/4 頻段）
                const voiceBand = freqData.slice(0, freqData.length >> 2);
                const avg = voiceBand.reduce((a, b) => a + b, 0) / voiceBand.length;
                setMouth(Math.min(1, avg / 80));
                rafId = requestAnimationFrame(updateMouth);
            }

            source.onended = () => {
                cancelAnimationFrame(rafId);
                setMouth(0);
            };

            source.start();
            updateMouth();
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            inputField.value = '';
            sendBtn.disabled = true;
            dialogBox.style.display = 'block';
            dialogBox.innerText = "思考中...";

            try {
                const response = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) {
                    throw new Error(`伺服器錯誤 ${response.status}`);
                }

                const data = await response.json();

                dialogBox.innerText = data.reply || "（沉默）";
                triggerEmotionAction(data.emotion);

                if (data.audio_base64 && live2dModel) {
                    playWithLipSync(data.audio_base64).catch(e => {
                        console.warn("語音播放失敗:", e);
                    });
                }

            } catch (error) {
                console.error("發送失敗:", error);
                dialogBox.innerText = "連不上後端，請確認 server.py 有在執行。";
            } finally {
                sendBtn.disabled = false;
            }
        }
        
        function triggerEmotionAction(emotion) {
            if (!live2dModel) return;
            console.log("接收到大腦情緒:", emotion);
            
            switch(emotion) {
                case "happy":
                    live2dModel.expression("笑咪咪"); 
                    break;
                case "sad":
                    live2dModel.expression("眼泪");
                    break;
                case "surprised":
                    live2dModel.expression("眯眯眼");
                    break;
                default:
                    live2dModel.expression(); // 恢復預設
                    break;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        window.onload = init;
    </script>
</body>
</html>
